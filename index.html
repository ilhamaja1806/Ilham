<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JTRIFT | Premium Local Jackets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
    }
    h1, h2, h3, h4, .font-heading {
      font-family: 'Space Grotesk', sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
    .cubic-bezier {
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-grid-item {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    /* Heartbeat Animation */
    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.3); }
      50% { transform: scale(1); }
      75% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .animate-heartbeat {
      animation: heartbeat 0.4s ease-in-out;
    }

    /* Exit Animations */
    @keyframes fadeOutRight {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(50px); }
    }
    .animate-exit-wishlist {
      animation: fadeOutRight 0.4s ease-in forwards;
    }

    /* Cart Specific Animations */
    @keyframes cartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); filter: drop-shadow(0 0 10px rgba(234, 88, 12, 0.5)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 0px transparent); }
    }
    .animate-cart-pop {
      animation: cartPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-100%); opacity: 0; }
    }
    .animate-exit-cart {
      animation: slideOutLeft 0.4s ease-in forwards;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); opacity: 0.8; }
      70% { transform: scale(0.9); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-bounce-in {
      animation: bounceIn 0.5s cubic-bezier(0.215, 0.61, 0.355, 1);
    }

    /* Fly to Cart Animation */
    .product-flyer {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }

    /* Click Interaction */
    .squish-effect {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .squish-active {
      transform: scale(0.96);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-stone-50 text-stone-900">
  <div id="root"></div>

</body>
</html>
